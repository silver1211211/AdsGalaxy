<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdsGalaxy Internal Ad Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: rgba(2, 6, 23, .94);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .panel {
      position: relative;
      width: min(448px, 100%);
      max-height: calc(100vh - 28px);
      overflow-y: auto;
      background: #111821;
      border-radius: 18px;
      box-shadow: 0 24px 90px rgba(59, 130, 246, .22);
      border: 1px solid rgba(148, 163, 184, .12);
      padding: 16px 12px 14px;
      color: #fff;
    }
    .header {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
    }
    .close {
      display: none;
      position: absolute;
      right: 16px;
      top: 14px;
      z-index: 2;
      width: 32px;
      height: 32px;
      border: 0;
      background: transparent;
      color: #fff;
      font-size: 28px;
      line-height: 28px;
      font-weight: 300;
    }
    .creative {
      width: 100%;
      aspect-ratio: 1 / 1;
      max-height: 360px;
      border-radius: 8px;
      margin-top: 4px;
      background:
        radial-gradient(circle at 72% 32%, #f8fbff 0 8%, transparent 9%),
        radial-gradient(circle at 78% 68%, #f8fbff 0 8%, transparent 9%),
        linear-gradient(135deg, #f7fbff 0%, #c8e7ff 100%);
      position: relative;
      overflow: hidden;
    }
    .creative:before {
      content: "Grow Your\A Business";
      white-space: pre;
      position: absolute;
      left: 34px;
      top: 32px;
      color: #0f172a;
      font-size: 34px;
      line-height: .95;
      font-weight: 950;
    }
    .creative:after {
      content: "Learn More ->";
      position: absolute;
      left: 34px;
      bottom: 38px;
      background: #4f46ff;
      color: #fff;
      border-radius: 9px;
      padding: 13px 22px;
      font-size: 18px;
      font-weight: 900;
    }
    .rocket {
      position: absolute;
      right: 45px;
      top: 70px;
      width: 92px;
      height: 178px;
      border-radius: 48px 48px 28px 28px;
      background: linear-gradient(#fff, #dbeafe);
      transform: rotate(30deg);
      box-shadow: 0 18px 26px rgba(15, 23, 42, .22);
    }
    .rocket:before {
      content: "";
      position: absolute;
      left: 28px;
      top: 42px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: #0ea5e9;
      border: 6px solid #4f46ff;
    }
    .body {
      padding: 18px 10px 0;
      text-align: center;
    }
    .title {
      font-size: 17px;
      font-weight: 900;
      color: #646cff;
      margin-bottom: 8px;
    }
    .description {
      font-size: 14px;
      line-height: 1.45;
      color: #a7adbc;
      margin: 0 auto 18px;
      max-width: 330px;
    }
    .cta {
      width: 100%;
      border: 0;
      border-radius: 9px;
      background: #4f46ff;
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      padding: 14px 12px;
      box-shadow: 0 10px 22px rgba(79, 70, 255, .25);
    }
    .attribution {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 16px 0 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(148, 163, 184, .12);
      text-decoration: none;
      font-size: 15px;
      font-weight: 800;
    }
    .mark {
      display: inline-flex;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      align-items: center;
      justify-content: center;
      background: rgba(79, 70, 255, .12);
      color: #6d5cff;
      font-size: 23px;
      font-weight: 900;
    }
    .muted { color: #747b8d; }
    .brand { color: #676bff; }
    .countdown-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid rgba(148, 163, 184, .16);
      border-radius: 14px;
      background: rgba(15, 23, 42, .38);
      padding: 10px 10px 10px 16px;
    }
    .countdown-label {
      display: flex;
      align-items: center;
      color: #9aa3b5;
      font-size: 15px;
      font-weight: 800;
    }
    .clock {
      display: inline-flex;
      width: 24px;
      height: 24px;
      border: 2px solid #8791a5;
      border-radius: 999px;
      align-items: center;
      justify-content: center;
      margin-right: 9px;
      font-size: 12px;
      color: #8791a5;
    }
    .countdown {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border: 4px solid #5956ff;
      border-radius: 999px;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      background: #1b2230;
    }
    .helper {
      padding-top: 10px;
      color: #747b8d;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }
    body.done .close { display: block; }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">Ads</div>
    <button class="close" aria-label="Close ad">X</button>
    <div class="creative"><div class="rocket"></div></div>
    <div class="body">
      <div class="title">Take your project to the next level.</div>
      <div class="description">Advertise on AdsGalaxy and connect with millions of potential customers across Telegram Mini Apps, Channels and Bots.</div>
      <button class="cta">Learn More &nbsp;↗</button>
      <a class="attribution" href="https://t.me/Ads_Galaxy_bot">
        <span class="mark">◎</span><span class="muted">Sponsored by</span><strong class="brand">AdsGalaxy</strong>
      </a>
      <div class="countdown-box">
        <div class="countdown-label"><span class="clock">◷</span><span>Skip in <strong id="skip">15s</strong></span></div>
        <div class="countdown" id="count">15</div>
      </div>
      <div class="helper">You can skip this ad after the countdown to claim your reward.</div>
    </div>
  </div>
  <script>
    const state = new URLSearchParams(location.search).get("state");
    if (state === "done") {
      document.body.classList.add("done");
      document.getElementById("skip").textContent = "0s";
      document.getElementById("count").textContent = "0";
    }
  </script>
</body>
</html>
